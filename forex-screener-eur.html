<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Screener EUR — Ebury</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .tradingview-widget-container { height: 100vh; width: 100%; }
  .tradingview-widget-container__widget { height: calc(100% - 32px); width: 100%; }
</style>
</head>
<body>

<!-- TradingView Widget BEGIN -->
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <div class="tradingview-widget-copyright">
    <a href="https://www.tradingview.com/" rel="noopener nofollow" target="_blank">
      <span class="blue-text">Suivre les marchés sur TradingView</span>
    </a>
  </div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
  {
    "width": "100%",
    "height": "100%",
    "defaultColumn": "performance",
    "screener_type": "forex_mkt",
    "displayCurrency": "EUR",
    "colorTheme": "light",
    "locale": "fr",
    "isTransparent": false
  }
  </script>
</div>
<!-- TradingView Widget END -->

</body>
</html>
